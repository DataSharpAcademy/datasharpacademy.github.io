<meta charset="utf-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<meta name="author"
      content="{{ site.author }}">

<meta property="og:title"
      content="{{ page.title | default: site.name }}">

<meta property="og:description"
      content="{{ page.description | default: page.excerpt | strip_html | default: site.description }}">

<meta property="og:image"
      content="{{ site.url }}{{ page.image | default: site.social_image }}">

<meta property="og:type"
      content="article">

<meta property="og:url"
      content="{{ site.url }}{{ page.url }}">

<meta name="twitter:card"
      content="summary_large_image">

<meta name="twitter:title"
      content="{{ page.title | default: site.name }}">

<meta name="twitter:description"
      content="{{ page.description | default: page.excerpt | strip_html | default: site.description }}">

<meta name="twitter:image"
      content="{{ site.url }}{{ page.image | default: site.social_image }}">
